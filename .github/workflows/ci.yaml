name: Warlock Agents CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_requests:
    branches: [ "main" ]

jobs:
  ci:
    name: Warlock Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set Up UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Run Ruff Linter
        run: uv run ruff check
